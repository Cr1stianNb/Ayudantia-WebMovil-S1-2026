<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Ayudantía 1</title>
    <link rel="stylesheet" href="css/index.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="https://assets.pokemon.com/static2/_ui/img/favicon.ico"></link>
</head>

<body>
    <header>
        <h1>Pokédex</h1>
    </header>
    <main id="main"> 
        <!-- La estructura que debería de seguir la pokédex -->
        <!--inicio-->
        <div class="card-pokemon">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png" />
            <p class="id">N° 1</p>
            <h2>Bulbasaur</h2>
            <div class="types">
                <p class="type grass">grass</p>
                <p class="type poison">poison</p>
            </div>
        </div>  
        <!--fin-->             
    </main>

    <script>

        const getPokemon = async (pokemonUrl) => {
            try {
                const res = await fetch(pokemonUrl);
                if (!res.ok) {
                    throw new Error('Error al hacer fetch');
                }
                const data = await res.json();


                return {
                    id: data.id,
                    name: data.name,
                    sprite: data.sprites.other["official-artwork"].front_shiny,
                    types: data.types.map((d) => d.type.name)
                } 
            } catch(e) {
                console.error(e);
            }
        }


        const getPokemons = async () => {

            const main = document.getElementById("main")

            try {
                const res = await fetch("https://pokeapi.co/api/v2/pokemon?limit=151&offset=0");
                if(!res.ok) {
                    throw new Error('Error al hacer fetch...')
                }
                const data = await res.json();

                const pokemons = await Promise.all(data.results.map(async (o) => (
                    await getPokemon(o.url)
                )))

                const cardPokemons = pokemons.map((pokemon) => {
                    
                    const cardTypes = pokemon.types.map((typeName) => (
                        `<p class="type ${typeName}">${typeName}</p>`
                    )).join('')

                    return `
                    <div class="card-pokemon">
                        <img src="${pokemon.sprite}" />
                        <p class="id">N° ${pokemon.id}</p>
                        <h2>${pokemon.name}</h2>
                        <div class="types">
                            ${cardTypes}
                        </div>
                    </div>      
                    `
                }).join('')

                main.innerHTML = cardPokemons
                
            } catch(e){
                console.error(e);
            }
        }

        getPokemons();
    
    </script>
</body>
